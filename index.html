<!DOCTYPE html>
<html>
<head>
  <title>Admin POS</title>

  <style>
    body { font-family: Arial; background:#f5f5f5; margin:0; }

    .hidden { display:none; }

    .container {
      display:flex;
      height:100vh;
    }

    .sidebar {
      width:220px;
      background:#111;
      color:#fff;
      padding:10px;
    }

    .main {
      flex:1;
      padding:20px;
    }

    input, select {
      width:100%;
      padding:8px;
      margin:5px 0;
    }

    button {
      width:100%;
      padding:10px;
      background:#28a745;
      color:#fff;
      border:none;
      cursor:pointer;
      margin-top:5px;
    }

    table {
      width:100%;
      background:#fff;
      margin-top:10px;
      border-collapse:collapse;
    }

    td, th {
      padding:10px;
      border:1px solid #ddd;
    }

    .card {
      background:#fff;
      padding:15px;
      margin-bottom:10px;
      border-radius:8px;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
  <h2>Admin Login</h2>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

  <div class="container">

    <div class="sidebar">
      <h3>Admin Panel</h3>
      <button onclick="show('users')">Users</button>
      <button onclick="seedAdmin()">Seed Admin</button>
      <button onclick="logout()">Logout</button>
    </div>

    <div class="main">

      <!-- CREATE USER -->
      <div class="card">
        <h3>Create User</h3>

        <input id="newUser" placeholder="Username">
        <input id="newPass" placeholder="Password">
        <select id="role">
          <option value="cashier">Cashier</option>
          <option value="admin">Admin</option>
        </select>

        <input id="branch" placeholder="Branch ID">
        <button onclick="createUser()">Create</button>
      </div>

      <!-- USERS TABLE -->
      <div class="card">
        <h3>Users</h3>
        <table>
          <thead>
            <tr>
              <th>User</th>
              <th>Role</th>
              <th>Branch</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="usersTable"></tbody>
        </table>
      </div>

    </div>

  </div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbyCmt1PQZw_9N1Ovwk8eAhX3VsLfPiFVQBJWGi-TZoH7zh0JVne7mh4zIvuOniGN9M/exec";

let currentUser = null;

// ================= LOGIN =================
async function login() {
  const res = await fetch(API, {
    method:"POST",
    body: JSON.stringify({
      action:"login",
      username: username.value,
      password: password.value
    })
  });

  const data = await res.json();

  if(data.success && data.user.role === "admin"){
    currentUser = data.user;

    loginPage.classList.add("hidden");
    dashboard.classList.remove("hidden");

    loadUsers();
  } else {
    alert("Access denied");
  }
}

// ================= CREATE USER =================
async function createUser() {
  await fetch(API, {
    method:"POST",
    body: JSON.stringify({
      action:"createUser",
      username: newUser.value,
      password: newPass.value,
      role: role.value,
      branchId: branch.value
    })
  });

  loadUsers();
}

// ================= LOAD USERS =================
async function loadUsers() {
  const res = await fetch(API + "?action=getUsers");
  const users = await res.json();

  let html = "";

  users.forEach(u => {
    html += `
      <tr>
        <td>${u.username}</td>
        <td>${u.role}</td>
        <td>${u.branchId}</td>
        <td><button onclick="deleteUser('${u.username}')">Delete</button></td>
      </tr>
    `;
  });

  usersTable.innerHTML = html;
}

// ================= DELETE =================
async function deleteUser(username) {
  await fetch(API, {
    method:"POST",
    body: JSON.stringify({
      action:"deleteUser",
      username
    })
  });

  loadUsers();
}

// ================= SEED ADMIN =================
async function seedAdmin() {
  const res = await fetch(API, {
    method:"POST",
    body: JSON.stringify({ action:"seedAdmin" })
  });

  const data = await res.json();
  alert(data.message);
}

// ================= LOGOUT =================
function logout() {
  location.reload();
}

</script>

</body>
</html>
