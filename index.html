<!DOCTYPE html>
<html>
<head>
  <title>Cafeteria POS</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f6f9;
    }

    .hidden { display: none; }

    #login {
      width: 320px;
      margin: 120px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    #dash {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 220px;
      background: #111;
      color: white;
      padding: 10px;
    }

    .sidebar button {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      background: #222;
      color: white;
      border: 0;
      cursor: pointer;
    }

    .main {
      flex: 1;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 10px;
    }

    input, select {
      width: 100%;
      padding: 8px;
      margin: 5px 0;
    }

    table {
      width: 100%;
      background: white;
      border-collapse: collapse;
    }

    td, th {
      border: 1px solid #ddd;
      padding: 8px;
    }

    button {
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>Admin Login</h2>
  <input id="u" placeholder="username">
  <input id="p" type="password" placeholder="password">
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dash" class="hidden">

  <div class="sidebar">
    <button onclick="loadUsers()">Users</button>
    <button onclick="loadBranches()">Branches</button>
    <button onclick="loadProducts()">Products</button>
    <button onclick="loadReports()">Reports</button>
  </div>

  <div class="main" id="main"></div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbyCmt1PQZw_9N1Ovwk8eAhX3VsLfPiFVQBJWGi-TZoH7zh0JVne7mh4zIvuOniGN9M/exec";

let user = null;

// ===================== SAFE API CALL =====================
async function api(data) {
  const res = await fetch(API, {
    method: "POST",
    headers: {
      "Content-Type": "text/plain;charset=utf-8"
    },
    body: JSON.stringify(data)
  });

  return await res.json();
}

// ===================== LOGIN =====================
async function login() {
  const r = await api({
    action: "login",
    username: u.value,
    password: p.value
  });

  if (r.success && r.user.role === "admin") {
    user = r.user;
    login.classList.add("hidden");
    dash.classList.remove("hidden");
    loadUsers();
  } else {
    alert("Login failed");
  }
}

// ===================== USERS =====================
async function loadUsers() {
  const users = await api({ action: "getUsers" });

  const branches = await api({ action: "getBranches" });

  main.innerHTML = `
    <div class="card">
      <h3>Create User</h3>

      <input id="nu" placeholder="username">
      <input id="np" placeholder="password">

      <select id="nb">
        ${branches.map(b => `<option value="${b.id}">${b.name}</option>`).join("")}
      </select>

      <select id="role">
        <option value="cashier">cashier</option>
        <option value="admin">admin</option>
      </select>

      <button onclick="createUser()">Create</button>
    </div>

    <table>
      <tr><th>User</th><th>Role</th><th>Branch</th></tr>
      ${users.map(u => `
        <tr>
          <td>${u.username}</td>
          <td>${u.role}</td>
          <td>${u.branchId}</td>
        </tr>
      `).join("")}
    </table>
  `;
}

async function createUser() {
  await api({
    action: "createUser",
    username: nu.value,
    password: np.value,
    role: role.value,
    branchId: nb.value
  });

  loadUsers();
}

// ===================== BRANCHES =====================
async function loadBranches() {
  const d = await api({ action: "getBranches" });

  main.innerHTML = `
    <div class="card">
      <h3>Add Branch</h3>
      <input id="bid" placeholder="id">
      <input id="bname" placeholder="name">
      <button onclick="addBranch()">Add</button>
    </div>

    ${d.map(b => `
      <div class="card">
        ${b.name} (${b.id})
      </div>
    `).join("")}
  `;
}

async function addBranch() {
  await api({
    action: "addBranch",
    id: bid.value,
    name: bname.value
  });

  loadBranches();
}

// ===================== PRODUCTS =====================
async function loadProducts() {
  const d = await api({ action: "getProducts" });

  main.innerHTML = `
    <div class="card">
      <h3>Add Product</h3>

      <input id="pid" placeholder="id">
      <input id="pname" placeholder="name">
      <input id="pcat" placeholder="category">
      <input id="pprice" placeholder="price">

      <button onclick="addProduct()">Add</button>
    </div>

    ${d.map(p => `
      <div class="card">
        ${p[1]} - ${p[3]}
      </div>
    `).join("")}
  `;
}

async function addProduct() {
  await api({
    action: "addProduct",
    id: pid.value,
    name: pname.value,
    category: pcat.value,
    price: pprice.value
  });

  loadProducts();
}

// ===================== REPORTS =====================
async function loadReports() {
  const d = await api({ action: "getReports" });

  main.innerHTML = `
    <div class="card">
      <h2>Total Revenue: ${d.totalRevenue}</h2>
      <h4>Sales Count: ${d.count}</h4>
    </div>
  `;
}

</script>

</body>
</html>
