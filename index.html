<!DOCTYPE html>
<html>
<head>
  <title>Cafeteria POS</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
    }

    .hidden {
      display: none;
    }

    #products {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .card {
      background: white;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
    }

    .card img {
      width: 100%;
    }

    #cart {
      position: fixed;
      right: 0;
      top: 0;
      width: 300px;
      background: white;
      height: 100%;
      padding: 10px;
    }
  </style>

</head>

<body>

<div id="loginPage">
  <h2>Login</h2>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<div id="posPage" class="hidden">
  <header>
    <img id="userPhoto">
    <h3 id="branchName"></h3>
  </header>

  <div id="products"></div>

  <div id="cart">
    <h3>Cart</h3>
    <div id="cartItems"></div>

    <input id="paid" placeholder="Paid">
    <p>Total: <span id="total"></span></p>
    <p>Change: <span id="change"></span></p>

    <button onclick="completeSale()">Checkout</button>
  </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbyCmt1PQZw_9N1Ovwk8eAhX3VsLfPiFVQBJWGi-TZoH7zh0JVne7mh4zIvuOniGN9M/exec";

let user = null;
let cart = [];

// ======================
// LOGIN
// ======================
async function login() {
  const res = await fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "login",
      username: username.value,
      password: password.value
    })
  });

  const data = await res.json();

  if (data.success) {
    user = data.user;

    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("posPage").classList.remove("hidden");

    loadProducts();

    userPhoto.src = user.photo;
    branchName.innerText = "Branch: " + user.branchId;

  } else {
    alert("Login failed");
  }
}

// ======================
// PRODUCTS
// ======================
async function loadProducts() {
  const res = await fetch(`${API}?action=getProducts&branchId=${user.branchId}`);
  const products = await res.json();

  const container = document.getElementById("products");
  container.innerHTML = "";

  products.forEach(p => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${p.image}">
      <h4>${p.name}</h4>
      <p>${p.price} EGP</p>
      <p>Stock: ${p.stock}</p>
    `;

    div.onclick = () => addToCart(p);
    container.appendChild(div);
  });
}

// ======================
// CART
// ======================
function addToCart(product) {
  let item = cart.find(i => i.id === product.id);

  if (item) {
    item.qty++;
  } else {
    cart.push({ ...product, qty: 1 });
  }

  renderCart();
}

function renderCart() {
  const container = document.getElementById("cartItems");
  container.innerHTML = "";

  let total = 0;

  cart.forEach(item => {
    total += item.price * item.qty;

    container.innerHTML += `
      <div>${item.name} x${item.qty}</div>
    `;
  });

  document.getElementById("total").innerText = total;

  document.getElementById("paid").oninput = () => {
    let paid = Number(document.getElementById("paid").value);
    document.getElementById("change").innerText = paid - total;
  };
}

// ======================
// CHECKOUT
// ======================
async function completeSale() {
  const total = Number(document.getElementById("total").innerText);
  const paid = Number(document.getElementById("paid").value);

  const res = await fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "sale",
      cashier: user.username,
      branchId: user.branchId,
      total,
      paid,
      change: paid - total,
      payment: "cash",
      items: cart
    })
  });

  const data = await res.json();

  if (data.success) {
    alert("Invoice: " + data.invoiceId);
    cart = [];
    renderCart();
    loadProducts();
  }
}
</script>

</body>
</html>
