<!DOCTYPE html>
<html>
<head>
<title>POS Admin</title>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9}

#login{
  width:320px;margin:120px auto;background:#fff;padding:20px;border-radius:10px
}

#app{
  display:none;
  height:100vh;
}

.sidebar{
  width:220px;background:#111;color:#fff;padding:10px
}

.sidebar button{
  width:100%;padding:10px;margin:5px 0;background:#222;color:#fff;border:0
}

.main{flex:1;padding:20px}

.container{display:flex;height:100vh}

.card{background:#fff;padding:15px;margin-bottom:10px;border-radius:10px}

input,select{
  width:100%;padding:8px;margin:5px 0
}

table{
  width:100%;background:#fff;border-collapse:collapse
}

td,th{border:1px solid #ddd;padding:8px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>Login</h2>
  <input id="u">
  <input id="p" type="password">
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app">
<div class="container">

<div class="sidebar">
<button onclick="loadUsers()">Users</button>
<button onclick="loadBranches()">Branches</button>
<button onclick="loadProducts()">Products</button>
<button onclick="loadReports()">Reports</button>
</div>

<div class="main" id="main"></div>

</div>
</div>

<script>

const API = "YOUR_URL";

async function api(d){
  const r = await fetch(API,{
    method:"POST",
    headers:{ "Content-Type":"text/plain" },
    body:JSON.stringify(d)
  });
  return r.json();
}

// ================= LOGIN FIX =================
async function login(){
  const r = await api({
    action:"login",
    username:u.value,
    password:p.value
  });

  if(r.success){
    login.style.display="none";
    app.style.display="block";
    loadUsers();
  }else{
    alert("login failed");
  }
}

// ================= USERS =================
async function loadUsers(){
  const users = await api({action:"getUsers"});
  const branches = await api({action:"getBranches"});

  main.innerHTML=`
  <div class="card">
    <h3>Create User</h3>

    <input id="nu">
    <input id="np">

    <select id="nb">
      ${branches.map(b=>`<option value="${b.id}">${b.name}</option>`).join("")}
    </select>

    <select id="role">
      <option>cashier</option>
      <option>admin</option>
    </select>

    <button onclick="createUser()">Create</button>
  </div>

  ${users.map(u=>`
    <div class="card">
      ${u.username} - ${u.role}
    </div>
  `).join("")}
  `;
}

async function createUser(){
  await api({
    action:"createUser",
    username:nu.value,
    password:np.value,
    role:role.value,
    branchId:nb.value
  });

  loadUsers();
}

// ================= BRANCHES =================
async function loadBranches(){
  const d = await api({action:"getBranches"});

  main.innerHTML=`
  <div class="card">
    <input id="bid">
    <input id="bname">
    <button onclick="addBranch()">Add</button>
  </div>

  ${d.map(b=>`
    <div class="card">${b.name}</div>
  `).join("")}
  `;
}

async function addBranch(){
  await api({
    action:"addBranch",
    id:bid.value,
    name:bname.value
  });

  loadBranches();
}

// ================= PRODUCTS =================
async function loadProducts(){
  const d = await api({action:"getProducts"});

  main.innerHTML=`
  <div class="card">
    <input id="pid">
    <input id="pname">
    <input id="pcat">
    <input id="pprice">
    <button onclick="addProduct()">Add</button>
  </div>

  ${d.map(p=>`
    <div class="card">${p[1]} - ${p[3]}</div>
  `).join("")}
  `;
}

async function addProduct(){
  await api({
    action:"addProduct",
    id:pid.value,
    name:pname.value,
    category:pcat.value,
    price:pprice.value
  });

  loadProducts();
}

// ================= REPORTS =================
async function loadReports(){
  const r = await api({
    action:"getReports",
    type:"summary"
  });

  main.innerHTML=`
  <div class="card">
    <h2>Total: ${r.total}</h2>
    <h4>Count: ${r.count}</h4>
  </div>
  `;
}

</script>

</body>
</html>
