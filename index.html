<!DOCTYPE html>
<html>
<head>
  <title>Cafeteria POS PRO</title>

  <style>
    body { font-family: Arial; margin:0; background:#f5f5f5; }

    .hidden { display:none; }

    header {
      background:#111;
      color:#fff;
      padding:10px;
      display:flex;
      align-items:center;
      gap:10px;
    }

    #userPhoto {
      width:40px; height:40px;
      border-radius:50%;
    }

    #products {
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
      padding:10px;
      margin-right:320px;
    }

    .card {
      background:#fff;
      padding:10px;
      border-radius:10px;
      cursor:pointer;
      transition:0.2s;
    }

    .card:hover { transform:scale(1.05); }

    .card img {
      width:100%;
      height:120px;
      object-fit:cover;
    }

    #cart {
      position:fixed;
      right:0;
      top:0;
      width:300px;
      background:#fff;
      height:100%;
      padding:10px;
      border-left:2px solid #ddd;
    }

    input { width:100%; padding:8px; margin-top:5px; }

    button {
      width:100%;
      padding:10px;
      margin-top:10px;
      background:#28a745;
      color:#fff;
      border:none;
      cursor:pointer;
    }

    .toast {
      position:fixed;
      bottom:20px;
      left:50%;
      transform:translateX(-50%);
      background:#333;
      color:#fff;
      padding:10px 20px;
      border-radius:5px;
      display:none;
    }
  </style>
</head>

<body>

<div id="loginPage">
  <h2>Login</h2>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<div id="posPage" class="hidden">
  <header>
    <img id="userPhoto">
    <h3 id="branchName"></h3>
  </header>

  <div id="products"></div>

  <div id="cart">
    <h3>Cart</h3>
    <div id="cartItems"></div>

    <input id="paid" placeholder="Paid">
    <p>Total: <span id="total">0</span></p>
    <p>Change: <span id="change">0</span></p>

    <button onclick="completeSale()">Checkout</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>

const API = "https://script.google.com/macros/s/AKfycbyCmt1PQZw_9N1Ovwk8eAhX3VsLfPiFVQBJWGi-TZoH7zh0JVne7mh4zIvuOniGN9M/exec";

let user=null, cart=[];

// 🔥 SAFE FETCH
async function apiCall(data) {
  const res = await fetch(API, {
    method:"POST",
    headers:{ "Content-Type":"text/plain" },
    body: JSON.stringify(data)
  });

  return await res.json();
}

// ================= LOGIN =================
async function login() {
  const data = await apiCall({
    action:"login",
    username:username.value,
    password:password.value
  });

  if(data.success){
    user=data.user;

    loginPage.classList.add("hidden");
    posPage.classList.remove("hidden");

    userPhoto.src=user.photo;
    branchName.innerText="Branch: "+user.branchId;

    loadProducts();
    showToast("Welcome "+user.username);

  }else showToast("Login Failed");
}

// ================= PRODUCTS =================
async function loadProducts(){
  const res = await fetch(`${API}?action=getProducts&branchId=${user.branchId}`);
  const products = await res.json();

  productsDiv = document.getElementById("products");
  productsDiv.innerHTML="";

  products.forEach(p=>{
    let div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <img src="${p.image}">
      <h4>${p.name}</h4>
      <p>${p.price} EGP</p>
      <p>Stock: ${p.stock}</p>
    `;

    div.onclick=()=>addToCart(p);
    productsDiv.appendChild(div);
  });
}

// ================= CART =================
function addToCart(p){
  let item=cart.find(i=>i.id===p.id);
  item?item.qty++:cart.push({...p,qty:1});
  renderCart();
}

function renderCart(){
  let html="", total=0;

  cart.forEach(i=>{
    total+=i.price*i.qty;
    html+=`<div>${i.name} x${i.qty}</div>`;
  });

  cartItems.innerHTML=html;
  totalEl.innerText=total;

  paid.oninput=()=>{
    change.innerText=(paid.value||0)-total;
  };
}

// ================= CHECKOUT =================
async function completeSale(){
  const total=Number(totalEl.innerText);
  const paidVal=Number(paid.value);

  if(paidVal<total) return showToast("Invalid payment");

  const data = await apiCall({
    action:"sale",
    cashier:user.username,
    branchId:user.branchId,
    total,
    paid:paidVal,
    change:paidVal-total,
    payment:"cash",
    items:cart
  });

  if(data.success){
    showToast("Invoice: "+data.invoiceId);
    cart=[];
    renderCart();
    loadProducts();
  }
}

// ================= TOAST =================
function showToast(msg){
  toast.innerText=msg;
  toast.style.display="block";
  setTimeout(()=>toast.style.display="none",2000);
}

</script>

</body>
</html>
